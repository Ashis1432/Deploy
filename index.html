<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-6 rounded-2xl shadow-lg w-80">
    <h2 class="text-2xl font-bold text-center mb-4">To-Do List For Me</h2>

    <div class="flex gap-2">
      <input id="taskInput" type="text" placeholder="Enter task"
        class="flex-1 border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
      <button onclick="addTask()"
        class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">Add</button>
    </div>

    <ul id="taskList" class="mt-4 space-y-2"></ul>
  </div>

  <script>
    function addTask() {
      const input = document.getElementById('taskInput');
      const taskText = input.value.trim();

      if (taskText === '') return;

      const li = document.createElement('li');
      li.className = "flex justify-between items-center bg-gray-100 px-3 py-2 rounded-lg";

      const span = document.createElement('span');
      span.textContent = taskText;

      const delBtn = document.createElement('button');
      delBtn.textContent = 'X';
      delBtn.className = "bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600";
      delBtn.onclick = function() {
        li.remove();
      };

      li.appendChild(span);
      li.appendChild(delBtn);

      document.getElementById('taskList').appendChild(li);

      input.value = '';
    }
  </script>

</body>
</html>
